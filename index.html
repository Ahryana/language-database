    function LanguageCard({ lang, onClick, selected }) {
      return (
        <div onClick={()=>onClick(lang.id)} className="cursor-pointer rounded-xl border-2 transition-all p-4"
          style={{borderColor:selected?lang.color:"#E5E7EB",background:selected?`${lang.color}10`:"white",boxShadow:selected?`0 0 0 2px ${lang.color}40`:"none"}}>
          <div className="flex items-center gap-3 mb-3">
            <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background:lang.color}}/>
            <div>
              <div className="font-bold text-gray-900">{lang.name}</div>
              <div className="text-xs text-gray-500">{lang.nativeName}</div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2 text-xs">
            <div className="bg-gray-50 rounded-lg p-2"><div className="text-gray-500">총 화자</div><div className="font-bold text-gray-800">{lang.totalSpeakers}백만+</div></div>
            <div className="bg-gray-50 rounded-lg p-2"><div className="text-gray-500">원어민</div><div className="font-bold text-gray-800">{lang.nativeSpeakers}백만</div></div>
          </div>
          <div className="mt-2 text-xs text-gray-500">공식 언어 국가: <span className="font-semibold text-gray-700">{lang.officialCountries}개</span></div>
        </div>
      );
    }

    function DetailPanel({ lang }) {

        <div className="h-full overflow-y-auto">

            <div className="w-4 h-4 rounded-full" style={{background:lang.color}}/>
            <div>
              <h2 className="text-xl font-bold text-gray-900">{lang.name} <span className="text-gray-500 font-normal text-base">({lang.nativeName})</span></h2>
              <div className="text-xs text-gray-500">{lang.family}</div>
            </div>
          </div>
          <div className="grid grid-cols-4 gap-2 mb-4">
            {[{label:"총 화자 수",value:`${lang.totalSpeakers}M+`,sub:"원어민+제2언어"},{label:"원어민 수",value:`${lang.nativeSpeakers}M`,sub:"모국어 화자"},{label:"공식 언어국",value:`${lang.officialCountries}개국`,sub:"공식/공동 공용어"},{label:"사용 국가",value:`${lang.totalCountries}개국+`,sub:"유의미한 화자 보유"}].map(({label,value,sub})=>(

                <div className="text-xs text-gray-500 mb-1">{label}</div>
                <div className="font-bold text-gray-900 text-sm">{value}</div>
                <div className="text-xs text-gray-400">{sub}</div>
              </div>
            ))}
          </div>
          <div className="mb-4">
            <div className="text-xs font-semibold text-gray-500 uppercase mb-2">주요 분포 리전</div>
            <div className="flex flex-wrap gap-2">
              {lang.regions.map(r=>(

            </div>
          </div>
          <div className="flex gap-1 mb-3 border-b border-gray-200">
            {["countries","sources"].map(t=>(
              <button key={t} onClick={()=>setTab(t)}
                className="px-3 py-1.5 text-xs font-semibold rounded-t-lg transition-all"
                style={{background:tab===t?lang.color:"transparent",color:tab===t?"white":"#6B7280"}}>
                {t==="countries"?"국가별 화자 수":"데이터 출처"}
              </button>
            ))}
          </div>
          {tab==="countries" && (
            <div className="space-y-1.5">
              {lang.topCountries.map((c,i)=>{
                const pct = Math.max(4,(c.speakers/lang.topCountries[0].speakers)*100);
                return (
                  <div key={c.country} className="flex items-center gap-2">
                    <div className="w-4 text-xs text-gray-400 text-right">{i+1}</div>
                    <div className="w-24 text-xs font-medium text-gray-700 flex-shrink-0">{c.country}</div>
                    <div className="flex-1 h-5 bg-gray-100 rounded-full overflow-hidden">
                      <div className="h-full rounded-full flex items-center pl-2" style={{width:`${pct}%`,background:lang.color,opacity:0.8}}>
                        <span className="text-white text-xs font-bold whitespace-nowrap">{fmt(c.speakers)}</span>
                      </div>
                    </div>
                    <div className="text-xs text-gray-400 w-20 text-right flex-shrink-0">{c.note}</div>
                  </div>
                );
              })}
            </div>
          )}
          {tab==="sources" && (
            <div className="space-y-3">
              {lang.sources.map((s,i)=>(
                <div key={i} className="bg-blue-50 border border-blue-100 rounded-lg p-3">
                  <div className="text-xs font-semibold text-blue-800">📄 {s.name}</div>
                  <a href={s.url} target="_blank" rel="noopener noreferrer"
                    className="text-xs text-blue-500 hover:text-blue-700 underline mt-1 block">🔗 {s.url}</a>
                </div>
              ))}
              <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                <div className="text-xs font-semibold text-yellow-800">⚠️ 데이터 해석 유의사항</div>
                <div className="text-xs text-yellow-700 mt-1">{lang.note}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SummaryTable({ langs, onSelect, selected }) {
      const [sort, setSort] = useState({key:"totalSpeakers",dir:"desc"});
      const sorted = useMemo(()=>[...langs].sort((a,b)=>sort.dir==="desc"?b[sort.key]-a[sort.key]:a[sort.key]-b[sort.key]),[langs,sort]);
      const toggle = k => setSort(s=>({key:k,dir:s.key===k&&s.dir==="desc"?"asc":"desc"}));
      const arrow = k => sort.key===k?(sort.dir==="desc"?" ↓":" ↑"):" ·";
      return (
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-gray-50 text-gray-500 uppercase text-left">
                {[{k:null,l:"언어"},{k:"totalSpeakers",l:"총 화자"},{k:"nativeSpeakers",l:"원어민"},{k:"officialCountries",l:"공식 국가"},{k:"totalCountries",l:"사용 국가"}].map(col=>(
                  <th key={col.l} onClick={()=>col.k&&toggle(col.k)}
                    className={`px-3 py-2 font-semibold ${col.k?"cursor-pointer hover:text-gray-700":""}`}>
                    {col.l}{col.k?arrow(col.k):""}
                  </th>
                ))}
                <th className="px-3 py-2 font-semibold">주요 리전</th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(lang=>(
                <tr key={lang.id} onClick={()=>onSelect(lang.id)}
                  className="border-t border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors"
                  style={{background:selected===lang.id?`${lang.color}08`:undefined}}>
                  <td className="px-3 py-2">
                    <div className="flex items-center gap-2">
                      <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background:lang.color}}/>
                      <div>
                        <div className="font-semibold text-gray-800">{lang.name}</div>
                        <div className="text-gray-400">{lang.nativeName}</div>
                      </div>
                    </div>
                  </td>
                  <td className="px-3 py-2 font-bold text-gray-700">{lang.totalSpeakers}M+</td>
                  <td className="px-3 py-2 text-gray-600">{lang.nativeSpeakers}M</td>
                  <td className="px-3 py-2 text-gray-600">{lang.officialCountries}</td>
                  <td className="px-3 py-2 text-gray-600">{lang.totalCountries}+</td>
                  <td className="px-3 py-2">
                    <div className="flex flex-wrap gap-1">
                      {lang.regions.slice(0,2).map(r=>(
                        <span key={r} className="text-xs px-1.5 py-0.5 rounded-full text-white" style={{background:REGION_COLORS[r]||"#9CA3AF"}}>{r}</span>
                      ))}
                      {lang.regions.length>2&&<span className="text-gray-400">+{lang.regions.length-2}</span>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("table");
      const [selected, setSelected] = useState("en");
      const selectedLang = LANGUAGES.find(l=>l.id===selected);
      return (
        <div className="min-h-screen bg-gray-50 p-4 font-sans">
          <div className="max-w-7xl mx-auto">
            <div className="mb-5">
              <h1 className="text-2xl font-bold text-gray-900">🌐 리전별 언어 사용현황 데이터베이스</h1>
              <p className="text-sm text-gray-500 mt-1">주요 12개 언어 · Ethnologue(SIL), Instituto Cervantes, OIF, IBGE, GUS, TÜİK 등 공신력 있는 기관 자료 기반 · 2024–2025 최신</p>
            </div>
            <div className="flex gap-2 mb-4">
              {[{id:"table",label:"📊 요약 테이블"},{id:"cards",label:"🃏 카드 + 상세 보기"}].map(v=>(
                <button key={v.id} onClick={()=>setView(v.id)}
                  className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${view===v.id?"bg-gray-900 text-white":"bg-white text-gray-600 border border-gray-200 hover:border-gray-400"}`}>
                  {v.label}
                </button>
              ))}
            </div>
            {view==="table"&&(
              <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div className="px-4 py-3 border-b border-gray-100 bg-gray-50 text-xs text-gray-500">헤더 클릭 시 정렬 · 행 클릭 시 카드 보기로 이동</div>
                <SummaryTable langs={LANGUAGES} onSelect={id=>{setSelected(id);setView("cards");}} selected={selected}/>
                <div className="px-4 py-3 border-t border-gray-100 text-xs text-gray-400">단위: M = 백만 명 · 원어민(L1) + 유의미한 제2언어(L2) 화자 포함 기준</div>
              </div>
            )}
            {view==="cards"&&(
              <div className="flex gap-4" style={{height:"75vh"}}>
                <div className="w-72 flex-shrink-0 overflow-y-auto pr-1 space-y-2">
                  {LANGUAGES.map(lang=><LanguageCard key={lang.id} lang={lang} onClick={setSelected} selected={selected===lang.id}/>)}
                </div>
                <div className="flex-1 bg-white rounded-2xl border border-gray-200 p-5 overflow-hidden">
                  <DetailPanel lang={selectedLang}/>
                </div>
              </div>
            )}
            <div className="mt-4 bg-white rounded-xl border border-gray-200 p-4">
              <div className="text-xs font-semibold text-gray-500 mb-3">📌 주요 데이터 출처</div>
              <div className="grid grid-cols-2 gap-2 text-xs text-gray-600">
                {[["Ethnologue (SIL International)","영어·중국어·독일어 외 다수","27판, 2024"],["Instituto Cervantes","스페인어","Anuario 2024·2025"],["OIF","프랑스어","La langue française 2022"],["IBGE (브라질 통계청)","포르투갈어","Censo 2022"],["GUS (폴란드 통계청)","폴란드어","인구조사 2021"],["TÜİK (튀르키예 통계청)","터키어","2023 추계"],["일본 총무성 통계국","일본어","인구 추계 2024"],["Arab League / CAPMAS","아랍어","2023"]].map(([src,langs,period])=>(
                  <div key={src} className="bg-gray-50 rounded-lg p-2">
                    <div className="font-semibold text-gray-700">{src}</div>
                    <div className="text-gray-500">{langs} · <span className="text-blue-500">{period}</span></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>

</html>
